server:
  http_port: 8080
  ws_port: 8081

mqtt:
  port: 1883
  host: "0.0.0.0"

database:
  type: "sqlite"
  path: "iot.db"

device:
  heartbeat_interval: 30
  offline_threshold: 90

auth:
  jwt_secret: "your-secret-key-change-in-production"
  access_token_expire: 30m
  refresh_token_expire: 168h
  bcrypt_cost: 10
  default_admin: "admin"
  default_password: "admin123"
